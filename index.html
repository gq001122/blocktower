<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>精准堆叠挑战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #1a1a2e; overflow: hidden; touch-action: none; }
        
        #gameContainer { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #gameCanvas { background: #16213e; image-rendering: pixelated; image-rendering: crisp-edges; }
        
        #topBar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 20px; padding: 10px 20px;
            background: rgba(0,0,0,0.7); border: 3px solid #0f3460; border-radius: 8px;
            color: #fff; font-size: 14px; z-index: 10;
        }
        #topBar .stat { display: flex; align-items: center; gap: 5px; }
        #topBar .stat span { color: #ffd93d; font-weight: bold; }
        
        #leftPanel {
            position: absolute; left: 10px; top: 70px; width: 140px; padding: 15px;
            background: rgba(0,0,0,0.8); border: 3px solid #0f3460; border-radius: 8px;
            color: #fff; font-size: 12px; z-index: 10;
        }
        #leftPanel h3 { color: #e94560; margin-bottom: 15px; font-size: 14px; text-align: center; }
        
        #offsetMeter {
            width: 100px; height: 20px; background: #333; border: 2px solid #555;
            border-radius: 10px; margin: 10px auto; position: relative; overflow: hidden;
        }
        #offsetIndicator {
            position: absolute; width: 8px; height: 100%; background: #4ecca3;
            border-radius: 50%; top: 0; left: 50%; transform: translateX(-50%); transition: left 0.1s, background 0.2s;
        }
        #offsetMeter::before {
            content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #fff; transform: translateX(-50%);
        }
        #offsetValue { text-align: center; margin-top: 5px; font-size: 12px; color: #aaa; }
        
        #stabilityMeter { margin-top: 15px; }
        #stabilityBar { width: 100%; height: 12px; background: #333; border: 2px solid #555; border-radius: 6px; overflow: hidden; }
        #stabilityFill { height: 100%; background: linear-gradient(90deg, #e94560, #ffd93d, #4ecca3); transition: width 0.3s; }
        
        #rightPanel {
            position: absolute; right: 10px; top: 70px; width: 120px; padding: 15px;
            background: rgba(0,0,0,0.8); border: 3px solid #0f3460; border-radius: 8px;
            color: #fff; font-size: 12px; z-index: 10;
        }
        #rightPanel h3 { color: #e94560; margin-bottom: 10px; font-size: 14px; text-align: center; }
        #nextBlock { width: 80px; height: 80px; margin: 10px auto; border: 2px dashed #0f3460; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
        #comboCount { text-align: center; color: #ffd93d; font-size: 16px; font-weight: bold; }
        
        #perfectAlert {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 32px; font-weight: bold; color: #ffd93d;
            text-shadow: 0 0 20px #ffd93d, 0 0 40px #ff8c00;
            display: none; z-index: 20; animation: perfectPop 0.8s ease-out;
        }
        @keyframes perfectPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        
        #startScreen, #gameOverScreen, #leaderboardScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26,26,46,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        #startScreen h1, #gameOverScreen h1, #leaderboardScreen h1 {
            color: #e94560; font-size: 32px; margin-bottom: 20px; text-shadow: 3px 3px 0 #000;
        }
        #startScreen p { color: #aaa; font-size: 14px; margin-bottom: 30px; text-align: center; max-width: 300px; line-height: 1.6; }
        
        .menuBtn {
            background: linear-gradient(135deg, #e94560, #ff6b6b); border: none; color: #fff;
            padding: 15px 40px; margin: 10px; font-size: 18px; cursor: pointer;
            font-family: inherit; border-radius: 25px; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }
        .menuBtn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(233,69,96,0.6); }
        
        #playerNameInput {
            padding: 12px 24px; font-size: 16px; font-family: inherit;
            border: 3px solid #0f3460; border-radius: 25px; background: #16213e;
            color: #fff; margin: 10px; width: 220px; text-align: center;
        }
        #playerNameInput::placeholder { color: #666; }
        
        #gameOverScreen .stats { color: #fff; font-size: 18px; margin: 20px 0; text-align: center; }
        #gameOverScreen .stats div { margin: 12px 0; }
        #gameOverScreen .stats span { color: #4ecca3; font-weight: bold; }
        
        #leaderboardScreen { display: none; }
        #leaderboardList {
            width: 80%; max-width: 400px; max-height: 60vh; overflow-y: auto;
            background: rgba(0,0,0,0.5); border: 3px solid #0f3460; border-radius: 10px; padding: 10px;
        }
        .rankItem {
            display: flex; justify-content: space-between; padding: 10px;
            border-bottom: 1px solid #0f3460; color: #fff; font-size: 12px; border-radius: 5px;
        }
        .rankItem:nth-child(1) { background: rgba(255,215,0,0.3); }
        .rankItem:nth-child(2) { background: rgba(192,192,192,0.3); }
        .rankItem:nth-child(3) { background: rgba(205,127,50,0.3); }
        .rankItem.current { background: rgba(233,69,96,0.5); border: 2px solid #e94560; }
        .rankNum { width: 30px; color: #ffd93d; font-weight: bold; }
        .rankName { flex: 1; margin-left: 10px; }
        .rankHeight { width: 60px; text-align: right; color: #4ecca3; }
        .rankScore { width: 60px; text-align: right; color: #ffd93d; }
        #closeLeaderboard { margin-top: 20px; }
        
        #controls {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            color: #666; font-size: 12px; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 15px;
        }
        
        #mobileControls {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: none; justify-content: center; gap: 40px; z-index: 10;
        }
        .mobileBtn {
            width: 65px; height: 65px; background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: 3px solid #fff; border-radius: 50%; color: #fff; font-size: 24px;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            user-select: none; box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }
        .mobileBtn:active { transform: scale(0.9); box-shadow: 0 2px 10px rgba(233,69,96,0.6); }
        #dropBtn { width: 80px; height: 80px; font-size: 14px; font-weight: bold; }
        
        @media (max-width: 768px) {
            #mobileControls { display: flex; }
            #controls { display: none; }
            #leftPanel, #rightPanel { width: 90px; font-size: 10px; padding: 10px; }
            #offsetMeter { width: 60px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="topBar">
            <div class="stat">🏗️ <span id="heightDisplay">0</span>层</div>
            <div class="stat">⭐ <span id="scoreDisplay">0</span>分</div>
            <div class="stat">⏱️ <span id="timeDisplay">00:00</span></div>
        </div>
        
        <div id="leftPanel">
            <h3>📊 偏移量</h3>
            <div id="offsetMeter"><div id="offsetIndicator"></div></div>
            <div id="offsetValue">0 px</div>
            <div id="stabilityMeter">
                <h3 style="margin-top:10px;">🏛️ 稳定性</h3>
                <div id="stabilityBar"><div id="stabilityFill" style="width: 100%;"></div></div>
            </div>
        </div>
        
        <div id="rightPanel">
            <h3>📦 下一个</h3>
            <div id="nextBlock"></div>
            <div id="comboCount">🔥 0连击</div>
        </div>
        
        <div id="perfectAlert">✨ PERFECT! ✨</div>
        
        <div id="startScreen">
            <h1>🎯 精准堆叠挑战</h1>
            <p>← → 左右微调位置<br>空格/点击 投放积木<br>完美中心放置获得额外加分！</p>
            <input type="text" id="playerNameInput" placeholder="输入你的名字" maxlength="10">
            <button class="menuBtn" id="startBtn">▶️ 开始游戏</button>
            <button class="menuBtn" id="rankBtn">🏆 排行榜</button>
        </div>
        
        <div id="gameOverScreen">
            <h1>💥 塔倒了！</h1>
            <div class="stats">
                <div>🏗️ 高度: <span id="finalHeight">0</span>层</div>
                <div>⭐ 总分: <span id="finalScore">0</span></div>
                <div>✨ 完美: <span id="perfectCount">0</span>次</div>
                <div>⏱️ 用时: <span id="finalTime">00:00</span></div>
            </div>
            <button class="menuBtn" id="restartBtn">🔄 再来一局</button>
            <button class="menuBtn" id="viewRankBtn">🏆 排行榜</button>
        </div>
        
        <div id="leaderboardScreen">
            <h1>🏆 排行榜</h1>
            <div id="leaderboardList"></div>
            <button class="menuBtn" id="closeLeaderboard">← 返回</button>
        </div>
        
        <div id="controls">← → 移动 | 空格 投放</div>
        
        <div id="mobileControls">
            <div class="mobileBtn" id="leftBtn">◀</div>
            <div class="mobileBtn" id="dropBtn">⬇️<br>投放</div>
            <div class="mobileBtn" id="rightBtn">▶</div>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            BLOCK_SIZE: 30,
            CANVAS_WIDTH: 400,
            CANVAS_HEIGHT: 600,
            BASE_HEIGHT: 40,
            SPAWN_Y: 80,           // 积木固定显示位置（屏幕上方）
            MOVE_SPEED: 5,         // 左右移动速度
            MAX_OFFSET: 120,
            PERFECT_THRESHOLD: 6,
            GOOD_THRESHOLD: 20,
            STABILITY_DECAY: 0.92,
            TILT_THRESHOLD: 35,
            VIEW_TOP: 80,         // 屏幕上方的积木空间
        };
        
        // ==================== 积木类型 ====================
        const BLOCK_TYPES = [
            { shape: [[1,1,1,1]], color: '#00CED1', name: '横条' },
            { shape: [[1,1],[1,1]], color: '#FFD700', name: '方块' },
            { shape: [[1,1,1]], color: '#87CEEB', name: '短横' },
            { shape: [[1,1]], color: '#20B2AA', name: '小横' },
            { shape: [[1],[1],[1],[1]], color: '#9370DB', name: '竖条' },
            { shape: [[1],[1],[1]], color: '#DDA0DD', name: '短竖' },
            { shape: [[1]], color: '#FF69B4', name: '单格' },
            { shape: [[1,1,1,1,1]], color: '#FF8C00', name: '特长横' },
            { shape: [[1],[1],[1],[1],[1]], color: '#98FB98', name: '特长竖' },
        ];
        
        // ==================== 游戏状态 ====================
        let game = {
            state: 'start',
            playerName: '玩家',
            uid: '',
            height: 0,
            score: 0,
            perfectCount: 0,
            combo: 0,
            startTime: 0,
            elapsedTime: 0,
            currentBlock: null,
            nextBlock: null,
            blocks: [],
            cameraY: 0,
            targetCameraY: 0,
            towerStability: 100,
            towerTilt: 0,
            readyToDrop: false,    // 是否可以投放
            keys: { left: false, right: false }
        };
        
        // ==================== Canvas设置 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const ratio = CONFIG.CANVAS_WIDTH / CONFIG.CANVAS_HEIGHT;
            let width = container.clientWidth;
            let height = container.clientHeight;
            if (width / height > ratio) width = height * ratio;
            else height = width / ratio;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = CONFIG.CANVAS_WIDTH;
            canvas.height = CONFIG.CANVAS_HEIGHT;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // ==================== 工具函数 ====================
        function generateUID() {
            return 'U' + Math.random().toString(36).substr(2, 8).toUpperCase();
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // ==================== 排行榜 ====================
        function getLeaderboard() {
            const data = localStorage.getItem('precisionStack_leaderboard');
            return data ? JSON.parse(data) : [];
        }
        
        function saveScore(playerName, height, score, perfectCount, time) {
            const leaderboard = getLeaderboard();
            leaderboard.push({
                uid: generateUID(), name: playerName, height, score, perfectCount, time,
                date: new Date().toISOString()
            });
            leaderboard.sort((a, b) => b.score - a.score);
            if (leaderboard.length > 100) leaderboard.length = 100;
            localStorage.setItem('precisionStack_leaderboard', JSON.stringify(leaderboard));
        }
        
        function displayLeaderboard() {
            const list = document.getElementById('leaderboardList');
            const leaderboard = getLeaderboard();
            list.innerHTML = '';
            if (leaderboard.length === 0) {
                list.innerHTML = '<div style="color:#666;text-align:center;padding:20px;">暂无记录</div>';
                return;
            }
            leaderboard.slice(0, 20).forEach((player, index) => {
                const item = document.createElement('div');
                item.className = 'rankItem' + (player.uid === game.uid ? ' current' : '');
                item.innerHTML = `
                    <span class="rankNum">#${index + 1}</span>
                    <span class="rankName">${player.name}</span>
                    <span class="rankHeight">${player.height}层</span>
                    <span class="rankScore">${player.score}分</span>
                `;
                list.appendChild(item);
            });
        }
        
        // ==================== 积木创建 ====================
        function createBlock(type) {
            return {
                ...type,
                shape: type.shape.map(r => [...r]),
                x: CONFIG.CANVAS_WIDTH / 2,
                y: CONFIG.SPAWN_Y,
                width: type.shape[0].length * CONFIG.BLOCK_SIZE,
                height: type.shape.length * CONFIG.BLOCK_SIZE,
                placed: false
            };
        }
        
        function spawnNextBlock() {
            game.currentBlock = game.nextBlock;
            game.currentBlock.x = CONFIG.CANVAS_WIDTH / 2;
            game.currentBlock.y = CONFIG.SPAWN_Y;  // 屏幕顶部
            game.currentBlock.placed = false;
            game.readyToDrop = true;
            
            // 预计算落点
            game.currentBlock.targetY = calculateLandingY(game.currentBlock.x, game.currentBlock);
            
            game.nextBlock = createBlock(BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)]);
            drawNextBlock();
        }
        
        function drawNextBlock() {
            const container = document.getElementById('nextBlock');
            const block = game.nextBlock;
            const cellSize = 12;
            let html = '<div style="display:grid;grid-template-columns:repeat(' + block.shape[0].length + ',' + cellSize + 'px);gap:1px;">';
            block.shape.forEach(row => {
                row.forEach(cell => {
                    if (cell) html += '<div style="width:' + cellSize + 'px;height:' + cellSize + 'px;background:' + block.color + ';border-radius:2px;"></div>';
                    else html += '<div style="width:' + cellSize + 'px;height:' + cellSize + 'px;"></div>';
                });
            });
            html += '</div>';
            container.innerHTML = html;
        }
        
        // ==================== 碰撞检测 ====================
        function checkCollision(x, block) {
            const baseTop = CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT;
            
            // 检查是否碰到地基
            if (block.y + block.height >= baseTop) {
                return { collided: true, y: baseTop - block.height };
            }
            
            // 检查是否碰到其他积木
            for (let existing of game.blocks) {
                const blockLeft = x - block.width / 2;
                const blockRight = x + block.width / 2;
                const blockTop = block.y;
                const blockBottom = block.y + block.height;
                
                const existLeft = existing.x - existing.width / 2;
                const existRight = existing.x + existing.width / 2;
                const existTop = existing.y;
                const existBottom = existing.y + existing.height;
                
                if (blockRight > existLeft && blockLeft < existRight &&
                    blockBottom > existTop && blockTop < existBottom) {
                    return { collided: true, y: existTop - block.height };
                }
            }
            
            return { collided: false, y: 0 };
        }
        
        // ==================== 计算落点（从顶部向下扫描找落点）====================
        function calculateLandingY(x, block) {
            const baseTop = CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT;
            
            // 从顶部开始扫描
            let landingY = 0;
            
            while (landingY < baseTop) {
                // 检查是否碰到其他积木（碰撞的是下一个位置）
                let hitBlock = false;
                for (let existing of game.blocks) {
                    const blockLeft = x - block.width / 2;
                    const blockRight = x + block.width / 2;
                    const blockBottom = landingY + block.height;
                    
                    const existLeft = existing.x - existing.width / 2;
                    const existRight = existing.x + existing.width / 2;
                    
                    // 水平重叠
                    if (blockRight > existLeft && blockLeft < existRight) {
                        // 积木底部碰到已有积木顶部
                        if (Math.abs(blockBottom - existing.y) < 5) {
                            return existing.y - block.height;
                        }
                    }
                }
                
                // 检查是否碰到地基
                if (landingY + block.height >= baseTop) {
                    return baseTop - block.height;
                }
                
                landingY += 5;
            }
            
            return baseTop - block.height;
        }
        
        // ==================== 放置积木（手动投放，触发动画下落）====================
        function dropBlock() {
            if (!game.readyToDrop || !game.currentBlock || game.currentBlock.placed) return;
            
            game.readyToDrop = false;
            game.currentBlock.dropping = true;  // 开始下落动画
        }
        
        // ==================== 积木放置完成（动画结束后调用）====================
        function onBlockLanded() {
            const block = game.currentBlock;
            if (!block) return;
            
            block.placed = true;
            block.dropping = false;
            block.y = block.targetY;  // 确保在落点位置
            
            const offset = Math.abs(block.x - CONFIG.CANVAS_WIDTH / 2);
            
            // 计算得分
            let placementBonus = 5;
            if (offset <= CONFIG.PERFECT_THRESHOLD) {
                placementBonus = 50;
                game.combo++;
                game.perfectCount++;
                showPerfectAlert();
            } else if (offset <= CONFIG.GOOD_THRESHOLD) {
                placementBonus = 20;
                game.combo = 0;
            } else {
                game.combo = 0;
            }
            
            game.score += 10 + placementBonus + game.combo * 10;
            
            // 更新稳定性
            updateStability(offset);
            
            // 检查倒塌
            if (Math.abs(game.towerTilt) > CONFIG.TILT_THRESHOLD) {
                towerCollapse();
                return;
            }
            
            game.blocks.push(block);
            game.height++;
            
            // 更新相机 - 只有当塔超出屏幕时才移动
            const towerTop = getTowerTop();
            const screenHeight = CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT - CONFIG.VIEW_TOP;
            if (towerTop < screenHeight) {
                game.targetCameraY = 0;  // 塔还在屏幕内，不移动相机
            } else {
                game.targetCameraY = towerTop - screenHeight;  // 塔太高了，向上移动相机
            }
            
            updateUI();
            
            setTimeout(() => {
                if (game.state === 'playing') spawnNextBlock();
            }, 300);
        }
        
        function getTowerTop() {
            if (game.blocks.length === 0) return CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT;
            let minY = CONFIG.CANVAS_HEIGHT;
            game.blocks.forEach(b => { if (b.y < minY) minY = b.y; });
            return minY;
        }
        
        function updateStability(offset) {
            const offsetPenalty = (offset / CONFIG.MAX_OFFSET) * 15;
            const recovery = offset <= CONFIG.PERFECT_THRESHOLD ? 5 : 0;
            game.towerStability = Math.max(0, Math.min(100, game.towerStability * CONFIG.STABILITY_DECAY - offsetPenalty + recovery));
            calculateTilt();
        }
        
        function calculateTilt() {
            if (game.blocks.length < 2) { game.towerTilt = 0; return; }
            let totalOffset = 0, weight = 0;
            game.blocks.forEach((block, i) => {
                const w = i + 1;
                totalOffset += (block.x - CONFIG.CANVAS_WIDTH / 2) * w;
                weight += w;
            });
            const avgOffset = totalOffset / weight;
            const towerHeight = game.blocks.length * CONFIG.BLOCK_SIZE;
            game.towerTilt = Math.atan2(avgOffset, towerHeight) * (180 / Math.PI);
        }
        
        function showPerfectAlert() {
            const alert = document.getElementById('perfectAlert');
            alert.style.display = 'block';
            setTimeout(() => { alert.style.display = 'none'; }, 800);
        }
        
        function towerCollapse() {
            game.state = 'gameover';
            document.getElementById('finalHeight').textContent = game.height;
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('perfectCount').textContent = game.perfectCount;
            document.getElementById('finalTime').textContent = formatTime(game.elapsedTime);
            saveScore(game.playerName, game.height, game.score, game.perfectCount, game.elapsedTime);
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        // ==================== 游戏控制 ====================
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('leaderboardScreen').style.display = 'none';
            
            game.playerName = document.getElementById('playerNameInput').value.trim() || '匿名玩家';
            game.uid = generateUID();
            game.state = 'playing';
            game.height = 0;
            game.score = 0;
            game.perfectCount = 0;
            game.combo = 0;
            game.startTime = Date.now();
            game.elapsedTime = 0;
            game.blocks = [];
            game.cameraY = 0;
            game.targetCameraY = 0;
            game.towerStability = 100;
            game.towerTilt = 0;
            game.readyToDrop = false;
            
            game.nextBlock = createBlock(BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)]);
            spawnNextBlock();
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('heightDisplay').textContent = game.height;
            document.getElementById('scoreDisplay').textContent = game.score;
            document.getElementById('timeDisplay').textContent = formatTime(game.elapsedTime);
            document.getElementById('comboCount').textContent = '🔥 ' + game.combo + '连击';
            
            if (game.currentBlock) {
                const offset = game.currentBlock.x - CONFIG.CANVAS_WIDTH / 2;
                const percent = 50 + (offset / CONFIG.MAX_OFFSET) * 50;
                const indicator = document.getElementById('offsetIndicator');
                indicator.style.left = Math.max(5, Math.min(95, percent)) + '%';
                if (Math.abs(offset) <= CONFIG.PERFECT_THRESHOLD) indicator.style.background = '#4ecca3';
                else if (Math.abs(offset) <= CONFIG.GOOD_THRESHOLD) indicator.style.background = '#ffd93d';
                else indicator.style.background = '#e94560';
                document.getElementById('offsetValue').textContent = Math.round(offset) + ' px';
            }
            
            document.getElementById('stabilityFill').style.width = game.towerStability + '%';
        }
        
        // ==================== 输入处理 ====================
        function handleInput() {
            if (game.state !== 'playing' || !game.currentBlock || !game.readyToDrop) return;
            
            if (game.keys.left) game.currentBlock.x -= CONFIG.MOVE_SPEED;
            if (game.keys.right) game.currentBlock.x += CONFIG.MOVE_SPEED;
            
            const halfWidth = game.currentBlock.width / 2;
            game.currentBlock.x = Math.max(halfWidth + 10, Math.min(CONFIG.CANVAS_WIDTH - halfWidth - 10, game.currentBlock.x));
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { game.keys.left = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { game.keys.right = true; e.preventDefault(); }
            if (e.key === ' ') { dropBlock(); e.preventDefault(); }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') game.keys.left = false;
            if (e.key === 'ArrowRight') game.keys.right = false;
        });
        
        // 移动端
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const dropBtn = document.getElementById('dropBtn');
        
        leftBtn.addEventListener('touchstart', (e) => { game.keys.left = true; e.preventDefault(); });
        leftBtn.addEventListener('touchend', () => { game.keys.left = false; });
        rightBtn.addEventListener('touchstart', (e) => { game.keys.right = true; e.preventDefault(); });
        rightBtn.addEventListener('touchend', () => { game.keys.right = false; });
        dropBtn.addEventListener('touchstart', (e) => { dropBlock(); e.preventDefault(); });
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('rankBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('leaderboardScreen').style.display = 'flex';
            displayLeaderboard();
        });
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('viewRankBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('leaderboardScreen').style.display = 'flex';
            displayLeaderboard();
        });
        document.getElementById('closeLeaderboard').addEventListener('click', () => {
            document.getElementById('leaderboardScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        });
        
        // ==================== 绘制 ====================
        function draw() {
            ctx.clearRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            
            // 平滑相机跟随
            game.cameraY += (game.targetCameraY - game.cameraY) * 0.1;
            
            if (game.state === 'playing') {
                game.elapsedTime = Math.floor((Date.now() - game.startTime) / 1000);
            }
            
            // 背景
            const bgGradient = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
            bgGradient.addColorStop(0, '#1a1a2e');
            bgGradient.addColorStop(1, '#16213e');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            
            // 绘制已放置的积木
            game.blocks.forEach(block => {
                drawBlock(block, false);
            });
            
            // 基座（固定在屏幕下方，不受相机影响）
            const baseY = CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT;
            const baseGradient = ctx.createLinearGradient(0, baseY, 0, CONFIG.CANVAS_HEIGHT);
            baseGradient.addColorStop(0, '#4a4a6a');
            baseGradient.addColorStop(1, '#2a2a4a');
            ctx.fillStyle = baseGradient;
            ctx.fillRect(CONFIG.CANVAS_WIDTH / 2 - 100, baseY, 200, CONFIG.BASE_HEIGHT);
            
            // 中心参考线
            ctx.strokeStyle = 'rgba(78, 204, 163, 0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(CONFIG.CANVAS_WIDTH / 2, baseY);
            ctx.lineTo(CONFIG.CANVAS_WIDTH / 2, 0);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 当前积木（固定在屏幕上方）
            if (game.currentBlock && game.state === 'playing') {
                const block = game.currentBlock;
                
                // 处理输入
                if (game.readyToDrop) {
                    handleInput();
                }
                
                // 下落动画
                if (block.dropping && block.targetY !== undefined) {
                    const dropSpeed = 8;
                    if (block.y < block.targetY) {
                        block.y = Math.min(block.y + dropSpeed, block.targetY);
                    }
                    if (block.y >= block.targetY) {
                        block.y = block.targetY;
                        onBlockLanded();  // 落到底了
                    }
                }
                
                // 下落轨迹（投放前显示）
                if (game.readyToDrop) {
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.moveTo(block.x, block.y);
                    ctx.lineTo(block.x, block.targetY + block.height);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // 完美区域指示
                    const offset = Math.abs(block.x - CONFIG.CANVAS_WIDTH / 2);
                    if (offset <= CONFIG.PERFECT_THRESHOLD) {
                        ctx.strokeStyle = '#4ecca3';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(block.x - block.width / 2 - 3, block.y - 3, block.width + 6, block.height + 6);
                    }
                }
                
                drawBlock(block, true);
            }
            
            updateUI();
            requestAnimationFrame(draw);
        }
        
        function drawBlock(block, isActive) {
            const cellSize = CONFIG.BLOCK_SIZE;
            const x = block.x - block.width / 2;
            const y = block.y - game.cameraY;
            
            for (let row = 0; row < block.shape.length; row++) {
                for (let col = 0; col < block.shape[row].length; col++) {
                    if (!block.shape[row][col]) continue;
                    
                    const cellX = x + col * cellSize;
                    const cellY = y + row * cellSize;
                    
                    // 跳过屏幕外的单元格
                    if (cellY > CONFIG.CANVAS_HEIGHT || cellY + cellSize < 0) continue;
                    
                    const gradient = ctx.createLinearGradient(cellX, cellY, cellX, cellY + cellSize);
                    gradient.addColorStop(0, block.color);
                    gradient.addColorStop(1, shadeColor(block.color, -30));
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(cellX, cellY, cellSize - 1, cellSize - 1);
                    
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(cellX + 2, cellY + 2, cellSize - 5, 3);
                    
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(cellX, cellY, cellSize - 1, cellSize - 1);
                    
                    if (isActive) {
                        ctx.shadowColor = block.color;
                        ctx.shadowBlur = 10;
                    }
                }
            }
            ctx.shadowBlur = 0;
        }
        
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }
        
        draw();
    </script>
</body>
