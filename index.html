<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>精准堆叠挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            overflow: hidden;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameCanvas {
            background: #16213e;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* 顶部信息栏 */
        #topBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
            background: rgba(0,0,0,0.7);
            border: 3px solid #0f3460;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 10;
        }
        
        #topBar .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        #topBar .stat span {
            color: #ffd93d;
            font-weight: bold;
        }
        
        /* 左侧面板 - 偏移指示器 */
        #leftPanel {
            position: absolute;
            left: 10px;
            top: 70px;
            width: 140px;
            padding: 15px;
            background: rgba(0,0,0,0.8);
            border: 3px solid #0f3460;
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            z-index: 10;
        }
        
        #leftPanel h3 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }
        
        /* 偏移仪表盘 */
        #offsetMeter {
            width: 100px;
            height: 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 10px;
            margin: 10px auto;
            position: relative;
            overflow: hidden;
        }
        
        #offsetIndicator {
            position: absolute;
            width: 8px;
            height: 100%;
            background: #4ecca3;
            border-radius: 50%;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s, background 0.2s;
        }
        
        #offsetMeter::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #fff;
            transform: translateX(-50%);
        }
        
        #offsetValue {
            text-align: center;
            margin-top: 5px;
            font-size: 12px;
            color: #aaa;
        }
        
        /* 稳定性指示 */
        #stabilityMeter {
            margin-top: 15px;
        }
        
        #stabilityBar {
            width: 100%;
            height: 12px;
            background: #333;
            border: 2px solid #555;
            border-radius: 6px;
            overflow: hidden;
        }
        
        #stabilityFill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ffd93d, #4ecca3);
            transition: width 0.3s;
        }
        
        /* 右侧面板 */
        #rightPanel {
            position: absolute;
            right: 10px;
            top: 70px;
            width: 120px;
            padding: 15px;
            background: rgba(0,0,0,0.8);
            border: 3px solid #0f3460;
            border-radius: 8px;
            color: #fff;
            font-size: 12px;
            z-index: 10;
        }
        
        #rightPanel h3 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 14px;
            text-align: center;
        }
        
        #nextBlock {
            width: 80px;
            height: 80px;
            margin: 10px auto;
            border: 2px dashed #0f3460;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #comboCount {
            text-align: center;
            color: #ffd93d;
            font-size: 16px;
            font-weight: bold;
        }
        
        /* 完美提示 */
        #perfectAlert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: bold;
            color: #ffd93d;
            text-shadow: 0 0 20px #ffd93d, 0 0 40px #ff8c00;
            display: none;
            z-index: 20;
            animation: perfectPop 0.8s ease-out;
        }
        
        @keyframes perfectPop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        
        /* 开始界面 */
        #startScreen, #gameOverScreen, #leaderboardScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26,26,46,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        #startScreen h1, #gameOverScreen h1, #leaderboardScreen h1 {
            color: #e94560;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0 #000;
        }
        
        #startScreen p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
            line-height: 1.6;
        }
        
        .menuBtn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            color: #fff;
            padding: 15px 40px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            font-family: inherit;
            border-radius: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }
        
        .menuBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233,69,96,0.6);
        }
        
        #playerNameInput {
            padding: 12px 24px;
            font-size: 16px;
            font-family: inherit;
            border: 3px solid #0f3460;
            border-radius: 25px;
            background: #16213e;
            color: #fff;
            margin: 10px;
            width: 220px;
            text-align: center;
        }
        
        #playerNameInput::placeholder {
            color: #666;
        }
        
        /* 游戏结束界面 */
        #gameOverScreen .stats {
            color: #fff;
            font-size: 18px;
            margin: 20px 0;
            text-align: center;
        }
        
        #gameOverScreen .stats div {
            margin: 12px 0;
        }
        
        #gameOverScreen .stats span {
            color: #4ecca3;
            font-weight: bold;
        }
        
        /* 完美分数高亮 */
        #gameOverScreen .stats .perfect-score span {
            color: #ffd93d;
            font-size: 24px;
        }
        
        /* 排行榜 */
        #leaderboardScreen {
            display: none;
        }
        
        #leaderboardList {
            width: 80%;
            max-width: 400px;
            max-height: 60vh;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            border: 3px solid #0f3460;
            border-radius: 10px;
            padding: 10px;
        }
        
        .rankItem {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #0f3460;
            color: #fff;
            font-size: 12px;
            border-radius: 5px;
        }
        
        .rankItem:nth-child(1) { background: rgba(255,215,0,0.3); }
        .rankItem:nth-child(2) { background: rgba(192,192,192,0.3); }
        .rankItem:nth-child(3) { background: rgba(205,127,50,0.3); }
        
        .rankItem.current {
            background: rgba(233,69,96,0.5);
            border: 2px solid #e94560;
        }
        
        .rankNum { width: 30px; color: #ffd93d; font-weight: bold; }
        .rankName { flex: 1; margin-left: 10px; }
        .rankHeight { width: 60px; text-align: right; color: #4ecca3; }
        .rankScore { width: 60px; text-align: right; color: #ffd93d; }
        
        #closeLeaderboard { margin-top: 20px; }
        
        /* 操作提示 */
        #controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 15px;
        }
        
        /* 移动端控制 */
        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: center;
            gap: 40px;
            z-index: 10;
        }
        
        .mobileBtn {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: 3px solid #fff;
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }
        
        .mobileBtn:active {
            transform: scale(0.9);
            box-shadow: 0 2px 10px rgba(233,69,96,0.6);
        }
        
        #dropBtn {
            width: 80px;
            height: 80px;
            font-size: 14px;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            #mobileControls { display: flex; }
            #controls { display: none; }
            #leftPanel, #rightPanel { width: 90px; font-size: 10px; padding: 10px; }
            #offsetMeter { width: 60px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- 顶部信息栏 -->
        <div id="topBar">
            <div class="stat">🏗️ <span id="heightDisplay">0</span>层</div>
            <div class="stat">⭐ <span id="scoreDisplay">0</span>分</div>
            <div class="stat">⏱️ <span id="timeDisplay">00:00</span></div>
        </div>
        
        <!-- 左侧面板 - 偏移与稳定性 -->
        <div id="leftPanel">
            <h3>📊 偏移量</h3>
            <div id="offsetMeter">
                <div id="offsetIndicator"></div>
            </div>
            <div id="offsetValue">0 px</div>
            
            <div id="stabilityMeter">
                <h3 style="margin-top:10px;">🏛️ 稳定性</h3>
                <div id="stabilityBar">
                    <div id="stabilityFill" style="width: 100%;"></div>
                </div>
            </div>
        </div>
        
        <!-- 右侧面板 -->
        <div id="rightPanel">
            <h3>📦 下一个</h3>
            <div id="nextBlock"></div>
            <div id="comboCount">🔥 0连击</div>
        </div>
        
        <!-- 完美提示 -->
        <div id="perfectAlert">✨ PERFECT! ✨</div>
        
        <!-- 开始界面 -->
        <div id="startScreen">
            <h1>🎯 精准堆叠挑战</h1>
            <p>控制积木左右移动<br>完美中心放置获得额外加分<br>偏离越大塔越晃！</p>
            <input type="text" id="playerNameInput" placeholder="输入你的名字" maxlength="10">
            <button class="menuBtn" id="startBtn">▶️ 开始游戏</button>
            <button class="menuBtn" id="rankBtn">🏆 排行榜</button>
        </div>
        
        <!-- 游戏结束界面 -->
        <div id="gameOverScreen">
            <h1>💥 塔倒了！</h1>
            <div class="stats">
                <div>🏗️ 高度: <span id="finalHeight">0</span>层</div>
                <div>⭐ 总分: <span id="finalScore">0</span></div>
                <div>✨ 完美: <span id="perfectCount">0</span>次</div>
                <div>⏱️ 用时: <span id="finalTime">00:00</span></div>
            </div>
            <button class="menuBtn" id="restartBtn">🔄 再来一局</button>
            <button class="menuBtn" id="viewRankBtn">🏆 排行榜</button>
        </div>
        
        <!-- 排行榜界面 -->
        <div id="leaderboardScreen">
            <h1>🏆 排行榜</h1>
            <div id="leaderboardList"></div>
            <button class="menuBtn" id="closeLeaderboard">← 返回</button>
        </div>
        
        <!-- 操作提示 -->
        <div id="controls">← → 微调位置 | 空格 投放</div>
        
        <!-- 移动端控制 -->
        <div id="mobileControls">
            <div class="mobileBtn" id="leftBtn">◀</div>
            <div class="mobileBtn" id="dropBtn">⬇️<br>投放</div>
            <div class="mobileBtn" id="rightBtn">▶</div>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            BLOCK_SIZE: 30,       // 积木大小
            CANVAS_WIDTH: 400,
            CANVAS_HEIGHT: 600,
            BASE_HEIGHT: 40,       // 地基高度
            SPAWN_Y: 60,           // 积木出生位置
            DROP_SPEED: 4,         // 下落速度
            MOVE_SPEED: 4,         // 左右微调速度
            MAX_OFFSET: 120,       // 最大偏移距离
            PERFECT_THRESHOLD: 6,  // 完美放置阈值（像素）
            GOOD_THRESHOLD: 20,    // 良好放置阈值
            STABILITY_DECAY: 0.92, // 稳定性衰减系数
            TILT_THRESHOLD: 35,    // 塔倒塌的倾斜角度
            VIEW_SPACE: 6,         // 屏幕上方的积木空间
        };
        
        // ==================== 积木类型 ====================
        const BLOCK_TYPES = [
            { shape: [[1,1,1,1]], color: '#00CED1', name: '横条', size: 4 },
            { shape: [[1,1],[1,1]], color: '#FFD700', name: '方块', size: 4 },
            { shape: [[1,1,1]], color: '#87CEEB', name: '短横', size: 3 },
            { shape: [[1,1]], color: '#20B2AA', name: '小横', size: 2 },
            { shape: [[1],[1],[1],[1]], color: '#9370DB', name: '竖条', size: 4 },
            { shape: [[1],[1],[1]], color: '#DDA0DD', name: '短竖', size: 3 },
            { shape: [[1]], color: '#FF69B4', name: '单格', size: 1 },
            { shape: [[1,1,1,1,1]], color: '#FF8C00', name: '特长横', size: 5 },
            { shape: [[1],[1],[1],[1],[1]], color: '#98FB98', name: '特长竖', size: 5 },
        ];
        
        // ==================== 游戏状态 ====================
        let game = {
            state: 'start',
            playerName: '玩家',
            uid: '',
            height: 0,
            score: 0,
            perfectCount: 0,
            combo: 0,
            startTime: 0,
            elapsedTime: 0,
            currentBlock: null,
            nextBlock: null,
            blocks: [],
            cameraY: 0,
            targetCameraY: 0,
            towerStability: 100,   // 塔的稳定性 0-100
            towerTilt: 0,          // 塔的倾斜角度
            inputOffset: 0,        // 玩家输入的偏移量
            // 按键状态
            keys: { left: false, right: false }
        };
        
        // ==================== Canvas设置 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const ratio = CONFIG.CANVAS_WIDTH / CONFIG.CANVAS_HEIGHT;
            
            let width = container.clientWidth;
            let height = container.clientHeight;
            
            if (width / height > ratio) {
                width = height * ratio;
            } else {
                height = width / ratio;
            }
            
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            canvas.width = CONFIG.CANVAS_WIDTH;
            canvas.height = CONFIG.CANVAS_HEIGHT;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // ==================== 工具函数 ====================
        function generateUID() {
            return 'U' + Math.random().toString(36).substr(2, 8).toUpperCase();
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function getRandomBlockType() {
            return BLOCK_TYPES[Math.floor(Math.random() * BLOCK_TYPES.length)];
        }
        
        // ==================== 排行榜 ====================
        function getLeaderboard() {
            const data = localStorage.getItem('precisionStack_leaderboard');
            return data ? JSON.parse(data) : [];
        }
        
        function saveScore(playerName, height, score, perfectCount, time) {
            const leaderboard = getLeaderboard();
            const entry = {
                uid: generateUID(),
                name: playerName,
                height: height,
                score: score,
                perfectCount: perfectCount,
                time: time,
                date: new Date().toISOString()
            };
            
            leaderboard.push(entry);
            leaderboard.sort((a, b) => b.score - a.score);
            
            if (leaderboard.length > 100) leaderboard.length = 100;
            
            localStorage.setItem('precisionStack_leaderboard', JSON.stringify(leaderboard));
            return leaderboard.findIndex(s => s.uid === entry.uid) + 1;
        }
        
        function displayLeaderboard() {
            const list = document.getElementById('leaderboardList');
            const leaderboard = getLeaderboard();
            
            list.innerHTML = '';
            
            if (leaderboard.length === 0) {
                list.innerHTML = '<div style="color:#666;text-align:center;padding:20px;">暂无记录</div>';
                return;
            }
            
            leaderboard.slice(0, 20).forEach((player, index) => {
                const item = document.createElement('div');
                item.className = 'rankItem' + (player.uid === game.uid ? ' current' : '');
                item.innerHTML = `
                    <span class="rankNum">#${index + 1}</span>
                    <span class="rankName">${player.name}</span>
                    <span class="rankHeight">${player.height}层</span>
                    <span class="rankScore">${player.score}分</span>
                `;
                list.appendChild(item);
            });
        }
        
        // ==================== 积木创建 ====================
        function createBlock(type) {
            return {
                ...type,
                x: CONFIG.CANVAS_WIDTH / 2,  // 初始居中
                y: CONFIG.SPAWN_Y,
                width: type.shape[0].length * CONFIG.BLOCK_SIZE,
                height: type.shape.length * CONFIG.BLOCK_SIZE,
                placed: false,
                offset: 0  // 相对中心的偏移
            };
        }
        
        function spawnNextBlock() {
            game.currentBlock = game.nextBlock;
            game.currentBlock.x = CONFIG.CANVAS_WIDTH / 2;
            game.currentBlock.y = CONFIG.SPAWN_Y;
            game.currentBlock.placed = false;
            game.currentBlock.offset = 0;
            
            game.nextBlock = createBlock(getRandomBlockType());
            drawNextBlock();
        }
        
        function drawNextBlock() {
            const container = document.getElementById('nextBlock');
            const block = game.nextBlock;
            const cellSize = 12;
            
            let html = '<div style="display:grid;grid-template-columns:repeat(' + block.shape[0].length + ',' + cellSize + 'px);gap:1px;">';
            
            block.shape.forEach(row => {
                row.forEach(cell => {
                    if (cell) {
                        html += '<div style="width:' + cellSize + 'px;height:' + cellSize + 'px;background:' + block.color + ';border-radius:2px;"></div>';
                    } else {
                        html += '<div style="width:' + cellSize + 'px;height:' + cellSize + 'px;"></div>';
                    }
                });
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // ==================== 碰撞检测 ====================
        function checkCollision(x, block) {
            const baseTop = CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT;
            
            // 检查是否碰到地基
            if (block.y + block.height >= baseTop) {
                return { collided: true, y: baseTop - block.height };
            }
            
            // 检查是否碰到其他积木
            for (let existing of game.blocks) {
                const blockLeft = x - block.width / 2;
                const blockRight = x + block.width / 2;
                const blockTop = block.y;
                const blockBottom = block.y + block.height;
                
                const existLeft = existing.x - existing.width / 2;
                const existRight = existing.x + existing.width / 2;
                const existTop = existing.y;
                const existBottom = existing.y + existing.height;
                
                // 水平重叠
                if (blockRight > existLeft && blockLeft < existRight) {
                    // 垂直重叠
                    if (blockBottom > existTop && blockTop < existBottom) {
                        // 碰撞，返回积木应该停下的位置
                        return { collided: true, y: existTop - block.height };
                    }
                }
            }
            
            return { collided: false, y: 0 };
        }
        
        // ==================== 放置积木 ====================
        function placeBlock() {
            const block = game.currentBlock;
            if (!block || block.placed) return;
            
            // 找到落点
            const result = checkCollision(block.x, block);
            block.y = result.y;
            block.placed = true;
            
            // 计算偏移
            const offset = Math.abs(block.x - CONFIG.CANVAS_WIDTH / 2);
            block.offset = offset;
            
            // 计算得分
            let placementBonus = 0;
            let placementQuality = '';
            
            if (offset <= CONFIG.PERFECT_THRESHOLD) {
                // 完美放置
                placementBonus = 50;
                placementQuality = 'PERFECT';
                game.combo++;
                game.perfectCount++;
                showPerfectAlert();
            } else if (offset <= CONFIG.GOOD_THRESHOLD) {
                // 良好放置
                placementBonus = 20;
                placementQuality = 'GOOD';
                game.combo = 0;
            } else {
                // 一般放置
                placementBonus = 5;
                placementQuality = 'OK';
                game.combo = 0;
            }
            
            // 连击加成
            const comboBonus = game.combo * 10;
            
            // 总得分 = 基础分 + 放置奖励 + 连击加成
            const totalPoints = 10 + placementBonus + comboBonus;
            game.score += totalPoints;
            
            // 更新塔的稳定性
            updateStability(offset);
            
            // 检查塔是否倒塌
            if (Math.abs(game.towerTilt) > CONFIG.TILT_THRESHOLD) {
                towerCollapse();
                return;
            }
            
            // 保存积木
            game.blocks.push(block);
            game.height++;
            
            // 更新相机
            game.targetCameraY = Math.max(0, (game.height - CONFIG.VIEW_SPACE) * CONFIG.BLOCK_SIZE);
            
            updateUI();
            
            // 下一块积木
            setTimeout(() => {
                if (game.state === 'playing') {
                    spawnNextBlock();
                }
            }, 300);
        }
        
        function updateStability(offset) {
            // 偏移越大，稳定性下降越多
            const offsetPenalty = (offset / CONFIG.MAX_OFFSET) * 15;
            
            // 完美放置恢复稳定性
            const recovery = offset <= CONFIG.PERFECT_THRESHOLD ? 5 : 0;
            
            // 更新稳定性
            game.towerStability = Math.max(0, Math.min(100, 
                game.towerStability * CONFIG.STABILITY_DECAY - offsetPenalty + recovery
            ));
            
            // 计算塔的倾斜
            calculateTilt();
        }
        
        function calculateTilt() {
            if (game.blocks.length < 2) {
                game.towerTilt = 0;
                return;
            }
            
            // 计算所有积木的平均偏移方向和程度
            let totalOffset = 0;
            let weight = 0;
            
            game.blocks.forEach((block, i) => {
                const w = i + 1;  // 越高的积木权重越大
                totalOffset += (block.x - CONFIG.CANVAS_WIDTH / 2) * w;
                weight += w;
            });
            
            const avgOffset = totalOffset / weight;
            const towerHeight = game.blocks.length * CONFIG.BLOCK_SIZE;
            
            // 计算倾斜角度
            game.towerTilt = Math.atan2(avgOffset, towerHeight) * (180 / Math.PI);
        }
        
        function showPerfectAlert() {
            const alert = document.getElementById('perfectAlert');
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 800);
        }
        
        function towerCollapse() {
            game.state = 'gameover';
            
            document.getElementById('finalHeight').textContent = game.height;
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('perfectCount').textContent = game.perfectCount;
            document.getElementById('finalTime').textContent = formatTime(game.elapsedTime);
            
            saveScore(game.playerName, game.height, game.score, game.perfectCount, game.elapsedTime);
            
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        // ==================== 游戏控制 ====================
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('leaderboardScreen').style.display = 'none';
            
            const nameInput = document.getElementById('playerNameInput');
            game.playerName = nameInput.value.trim() || '匿名玩家';
            
            game.uid = generateUID();
            game.state = 'playing';
            game.height = 0;
            game.score = 0;
            game.perfectCount = 0;
            game.combo = 0;
            game.startTime = Date.now();
            game.elapsedTime = 0;
            game.blocks = [];
            game.cameraY = 0;
            game.targetCameraY = 0;
            game.towerStability = 100;
            game.towerTilt = 0;
            game.inputOffset = 0;
            
            game.nextBlock = createBlock(getRandomBlockType());
            spawnNextBlock();
            
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('heightDisplay').textContent = game.height;
            document.getElementById('scoreDisplay').textContent = game.score;
            document.getElementById('timeDisplay').textContent = formatTime(game.elapsedTime);
            document.getElementById('comboCount').textContent = '🔥 ' + game.combo + '连击';
            
            // 更新偏移指示器
            if (game.currentBlock) {
                const offset = game.currentBlock.x - CONFIG.CANVAS_WIDTH / 2;
                const percent = 50 + (offset / CONFIG.MAX_OFFSET) * 50;
                const indicator = document.getElementById('offsetIndicator');
                const value = document.getElementById('offsetValue');
                
                indicator.style.left = Math.max(5, Math.min(95, percent)) + '%';
                
                if (Math.abs(offset) <= CONFIG.PERFECT_THRESHOLD) {
                    indicator.style.background = '#4ecca3';
                } else if (Math.abs(offset) <= CONFIG.GOOD_THRESHOLD) {
                    indicator.style.background = '#ffd93d';
                } else {
                    indicator.style.background = '#e94560';
                }
                
                value.textContent = Math.round(offset) + ' px';
            }
            
            // 更新稳定性条
            document.getElementById('stabilityFill').style.width = game.towerStability + '%';
        }
        
        // ==================== 输入处理 ====================
        function handleInput() {
            if (game.state !== 'playing' || !game.currentBlock || game.currentBlock.placed) return;
            
            // 处理键盘输入
            if (game.keys.left) {
                game.currentBlock.x -= CONFIG.MOVE_SPEED;
            }
            if (game.keys.right) {
                game.currentBlock.x += CONFIG.MOVE_SPEED;
            }
            
            // 限制范围
            const halfWidth = game.currentBlock.width / 2;
            game.currentBlock.x = Math.max(halfWidth + 10, Math.min(CONFIG.CANVAS_WIDTH - halfWidth - 10, game.currentBlock.x));
        }
        
        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { game.keys.left = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { game.keys.right = true; e.preventDefault(); }
            if (e.key === ' ' || e.key === 'ArrowDown') {
                if (game.state === 'playing' && game.currentBlock && !game.currentBlock.placed) {
                    placeBlock();
                }
                e.preventDefault();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') game.keys.left = false;
            if (e.key === 'ArrowRight') game.keys.right = false;
        });
        
        // 移动端控制
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const dropBtn = document.getElementById('dropBtn');
        
        leftBtn.addEventListener('touchstart', (e) => { game.keys.left = true; e.preventDefault(); });
        leftBtn.addEventListener('touchend', () => { game.keys.left = false; });
        rightBtn.addEventListener('touchstart', (e) => { game.keys.right = true; e.preventDefault(); });
        rightBtn.addEventListener('touchend', () => { game.keys.right = false; });
        dropBtn.addEventListener('touchstart', (e) => { 
            if (game.state === 'playing' && game.currentBlock && !game.currentBlock.placed) {
                placeBlock();
            }
            e.preventDefault(); 
        });
        
        // UI 按钮事件
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('rankBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('leaderboardScreen').style.display = 'flex';
            displayLeaderboard();
        });
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('viewRankBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('leaderboardScreen').style.display = 'flex';
            displayLeaderboard();
        });
        document.getElementById('closeLeaderboard').addEventListener('click', () => {
            document.getElementById('leaderboardScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'flex';
        });
        
        // ==================== 绘制 ====================
        function draw() {
            ctx.clearRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            
            // 更新相机
            game.cameraY += (game.targetCameraY - game.cameraY) * 0.15;
            
            // 更新时间
            if (game.state === 'playing') {
                game.elapsedTime = Math.floor((Date.now() - game.startTime) / 1000);
            }
            
            // 绘制背景
            const bgGradient = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
            bgGradient.addColorStop(0, '#1a1a2e');
            bgGradient.addColorStop(1, '#16213e');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            
            // 绘制塔的投影（根据倾斜角度）
            ctx.save();
            ctx.translate(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT);
            ctx.rotate(game.towerTilt * Math.PI / 180);
            ctx.translate(-CONFIG.CANVAS_WIDTH / 2, -(CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT));
            
            // 绘制基座
            const baseGradient = ctx.createLinearGradient(0, CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT, 0, CONFIG.CANVAS_HEIGHT);
            baseGradient.addColorStop(0, '#4a4a6a');
            baseGradient.addColorStop(1, '#2a2a4a');
            ctx.fillStyle = baseGradient;
            ctx.fillRect(CONFIG.CANVAS_WIDTH / 2 - 100, CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT, 200, CONFIG.BASE_HEIGHT);
            
            // 绘制基座上的参考线（完美放置指示）
            ctx.strokeStyle = 'rgba(78, 204, 163, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT);
            ctx.lineTo(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT - 400);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 绘制已放置的积木
            game.blocks.forEach(block => {
                drawBlock(block, false);
            });
            
            ctx.restore();
            
            // 绘制当前下落中的积木
            if (game.currentBlock && !game.currentBlock.placed && game.state === 'playing') {
                const block = game.currentBlock;
                
                // 处理输入
                handleInput();
                
                // 下落动画
                block.y += CONFIG.DROP_SPEED;
                
                // 检查碰撞
                const result = checkCollision(block.x, block);
                if (result.collided) {
                    block.y = result.y;
                    placeBlock();
                }
                
                // 绘制下落轨迹
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(block.x, CONFIG.SPAWN_Y);
                ctx.lineTo(block.x, block.y + block.height);
                ctx.stroke();
                ctx.setLineDash([]);
                
                // 绘制积木阴影
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(block.x - block.width / 2 + 3, block.y + block.height - 3, block.width, 6);
                
                // 绘制积木
                drawBlock(block, true);
                
                // 绘制偏移指示
                const offset = block.x - CONFIG.CANVAS_WIDTH / 2;
                if (Math.abs(offset) <= CONFIG.PERFECT_THRESHOLD) {
                    ctx.strokeStyle = '#4ecca3';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(block.x - block.width / 2 - 3, block.y - 3, block.width + 6, block.height + 6);
                }
            }
            
            // 绘制塔顶晃动指示
            if (game.towerStability < 50) {
                ctx.save();
                ctx.translate(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT - CONFIG.BASE_HEIGHT - game.height * CONFIG.BLOCK_SIZE);
                ctx.rotate(game.towerTilt * Math.PI / 180);
                ctx.strokeStyle = 'rgba(233, 69, 96, ' + (1 - game.towerStability / 50) * 0.5 + ')';
                ctx.lineWidth = 2;
                ctx.setLineDash([3, 3]);
                ctx.beginPath();
                ctx.moveTo(-20, 0);
                ctx.lineTo(20, 0);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }
            
            updateUI();
            requestAnimationFrame(draw);
        }
        
        function drawBlock(block, isActive) {
            const cellSize = CONFIG.BLOCK_SIZE;
            const x = block.x - block.width / 2;
            const y = block.y - game.cameraY;
            
            // 绘制每个单元格
            for (let row = 0; row < block.shape.length; row++) {
                for (let col = 0; col < block.shape[row].length; col++) {
                    if (!block.shape[row][col]) continue;
                    
                    const cellX = x + col * cellSize;
                    const cellY = y + row * cellSize;
                    
                    // 单元格渐变
                    const gradient = ctx.createLinearGradient(cellX, cellY, cellX, cellY + cellSize);
                    gradient.addColorStop(0, block.color);
                    gradient.addColorStop(1, shadeColor(block.color, -30));
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(cellX, cellY, cellSize - 1, cellSize - 1);
                    
                    // 高光
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillRect(cellX + 2, cellY + 2, cellSize - 5, 3);
                    
                    // 阴影线
                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(cellX, cellY, cellSize - 1, cellSize - 1);
                    
                    // 活跃积木的发光效果
                    if (isActive) {
                        ctx.shadowColor = block.color;
                        ctx.shadowBlur = 10;
                    }
                }
            }
            
            ctx.shadowBlur = 0;
        }
        
        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 +
                (R < 255 ? (R < 1 ? 0 : R) : 255) * 0x10000 +
                (G < 255 ? (G < 1 ? 0 : G) : 255) * 0x100 +
                (B < 255 ? (B < 1 ? 0 : B) : 255)
            ).toString(16).slice(1);
        }
        
        // 启动游戏循环
        draw();
    </script>
